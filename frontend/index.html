<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANAPIE | Financial Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --turq: #36C1B6; }
        body { 
            background-color: #000; 
            color: #fff; 
        }
        .turq-text { color: var(--turq); }
        .turq-bg { background-color: var(--turq); }
        .turq-border { border-color: var(--turq); }
        .neon-shadow { filter: drop-shadow(0 0 10px rgba(54, 193, 182, 0.5)); }
        
        /* Font logic: Headers use Press Start, data uses regular sans-serif */
        h1, h2, h3, .nav-tab, .font-cyber, header, aside { font-family: 'Press Start 2P', cursive; }
        .font-data { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji"; }

        .sidebar-transition { transition: transform 0.3s ease; z-index: 100; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://i.ibb.co.com/B7D5Rmz/image.png');
            background-size: cover;
            background-position: center;
        }
        .glass-card-cyber {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--turq);
            box-shadow: 0 0 15px rgba(54, 193, 182, 0.1);
        }
    </style>
  </head>
  <body class="font-data text-sm">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
